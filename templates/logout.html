<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Out | MR. Attendance</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFDFD;
            --surface-color: #FFFFFF;
            --on-surface: #000000;
            --card-border: rgba(0, 0, 0, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.04);
            --text-muted: rgba(0, 0, 0, 0.4);
            --logo-bg: #FFFFFF;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #0F172A;
            --on-surface: #FFFFFF;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --text-muted: rgba(255, 255, 255, 0.4);
            --logo-bg: #000000;
        }

        body {
            background-color: var(--bg-color);
            color: var(--on-surface);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: all 0.3s ease;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .bg-glow {
            position: fixed; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, var(--on-surface), transparent);
            opacity: 0.015; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; right: -50px; }
        .glow-2 { bottom: -80px; left: -60px; width: 700px; height: 700px; opacity: 0.01; }

        .glass-panel {
            background: var(--surface-color);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            box-shadow: 0 20px 80px var(--card-shadow);
            padding: 60px;
            max-width: 500px;
            width: 90%;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .sign-out-icon {
            font-size: 4rem;
            color: var(--on-surface);
            margin-bottom: 30px;
            opacity: 0.8;
        }

        h2 { font-weight: 900; letter-spacing: -1px; margin-bottom: 20px; }
        p { color: var(--text-muted); font-weight: 500; margin-bottom: 40px; }

        .btn-logout {
            background: #FF3B30;
            color: white;
            border-radius: 20px;
            padding: 18px 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 100%;
            text-decoration: none;
            display: inline-block;
        }
        .btn-logout:hover {
            transform: scale(1.02);
            opacity: 0.95;
            color: white;
        }

        .btn-cancel {
            background: transparent;
            color: var(--on-surface);
            border-radius: 20px;
            padding: 15px 40px;
            font-weight: 700;
            border: 1px solid var(--card-border);
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 15px;
            text-decoration: none;
            display: inline-block;
        }
        .btn-cancel:hover { background: rgba(0,0,0,0.02); }
        [data-theme="dark"] .btn-cancel:hover { background: rgba(255,255,255,0.02); }
    </style>
</head>
<body data-theme="light">
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <div class="glass-panel">
        <div class="sign-out-icon"><i class="fas fa-sign-out-alt"></i></div>
        <h2>Sign Out?</h2>
        <p>Are you sure you want to terminate your current session? You will need to log in again to access the workspace.</p>

        <a href="{{ url_for('auth.logout') }}" class="btn btn-logout">Confirm Logout</a>
        <a href="{{ url_for('auth.welcome') }}" class="btn btn-cancel">Go Back</a>
    </div>

    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
