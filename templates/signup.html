<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | MR. Attendance</title>
    <link rel="shortcut icon" href="images/MR.TECHLAB.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFDFD;
            --surface-color: #FFFFFF;
            --on-surface: #000000;
            --card-border: rgba(0, 0, 0, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.04);
            --text-muted: rgba(0, 0, 0, 0.4);
            --logo-bg: #000000;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #0F172A;
            --on-surface: #FFFFFF;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --text-muted: rgba(255, 255, 255, 0.4);
            --logo-bg: #000000;
        }

        /* Define the animation */
        @keyframes fadeSlideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Ensure body takes full screen and centers the card */
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f8fafc;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden; /* Prevents scrollbars from video */
        }

        /* Position the video to cover the entire screen */
        .bg-video {
            position: fixed;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            transform: translateX(-50%) translateY(-50%); /* Keeps it perfectly centered */
            z-index: -2; /* Sends it to the very back */
            object-fit: cover; /* Ensures no black bars */
            filter: grayscale(30%); /* Optional: Slightly desaturate for a more corporate look */
        }

        /* The Dark Overlay - This makes it look "Formal" */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1; /* Sits between the video and the login card */
            background: rgba(15, 23, 42, 0.65); /* Deep slate tint */
            /* Optional: Add a subtle vignette (darker edges) */
            background-image: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        .brand-logo-container {
            width: 80px; height: 80px;
            background: #000000 !important; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; margin: 0 auto 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 2. Elegant, Structured Glassmorphism Card */
        .signup-card {
            background: rgba(255, 255, 255, 0.03); /* Barely there white tint */
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-top: 1px solid rgba(255, 255, 255, 0.2); /* Soft top highlight */
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            animation: fadeSlideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 3. Formal Typography */
        .signup-card h2 {
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 0.5px;
            margin-bottom: 30px;
        }

        .signup-card h2 i {
            color: #38bdf8; /* Professional light blue accent */
        }

        /* 4. Structured, Clean Inputs */
        .form-floating > .form-control, .form-select {
            background: #FFFFFF !important;
            border: 1px solid rgba(0, 0, 0, 0.12) !important;
            border-radius: 10px;
            color: #000000 !important;
            padding-left: 15px;
            transition: all 0.3s ease;
        }
        [data-theme="dark"] .form-floating > .form-control, [data-theme="dark"] .form-select {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            color: #FFFFFF !important;
        }

        .input-group-text {
            background: rgba(255, 255, 255, 0.05) !important;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-right: none;
            border-radius: 10px 0 0 10px;
            color: #94a3b8;
        }

        /* Fix input borders to connect with the icon */
        .form-floating > .form-control {
            border-left: none;
            border-radius: 0 10px 10px 0;
        }

        /* 5. Focus States (Elegant Glow instead of Neon) */
        .form-floating > .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.08) !important;
            border-color: #38bdf8;
            box-shadow: none !important; /* Removes default bootstrap glow */
        }

        .input-group:focus-within .input-group-text {
            border-color: #38bdf8;
            color: #38bdf8;
        }

        .form-floating > label {
            color: #94a3b8;
            padding-left: 10px;
        }

        .form-floating > .form-control:focus ~ label,
        .form-floating > .form-control:not(:placeholder-shown) ~ label {
            color: #38bdf8;
        }

        /* 6. Professional Primary Button */
        .btn-signup {
            background: #0ea5e9;
            border: none;
            border-radius: 10px; /* Matching the input radius */
            padding: 12px 30px;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
            margin-top: 10px;
        }

        .btn-signup:hover {
            background: #0284c7;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(14, 165, 233, 0.4);
        }

        .alert-danger {
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            color: white;
        }
        .toggle-link {
            text-align: center;
            margin-top: 25px;
        }
        .toggle-link a {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        .toggle-link a:hover {
            color: #2980b9;
            text-decoration: underline;
        }
    </style>
</head>
<body data-theme="light">
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <nav class="navbar navbar-expand-lg top-bar fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <div class="brand-logo-container" style="width: 48px; height: 48px; margin: 0;">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="width:100%; height:100%; object-fit:contain; filter: contrast(1.1);">
                </div>
                <span>MR. Attendance</span>
            </a>
        </div>
    </nav>

    <video class="bg-video" autoplay loop muted playsinline>
        <source src="videos/hero-video.mp4" type="video/mp4">
    </video>

    <div class="video-overlay"></div>

    <div class="signup-card">
        <div class="brand-logo-container">
            <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="width:100%; height:100%; object-fit:contain; filter: contrast(1.1);">
        </div>
        <h2><i class="fas fa-user-plus me-2"></i>Create Account</h2>
        
        {% if error %}
            <div class="alert alert-danger" role="alert">
                <i class="fas fa-exclamation-triangle me-2"></i>{{ error }}
            </div>
        {% endif %}

        <form action="/signup" method="POST">
            <div class="form-floating mb-3">
                <select class="form-select" name="role" id="role" required>
                    <option value="student">👨‍🎓 Student</option>
                    <option value="admin">👨‍💼 Administrator</option>
                </select>
                <label for="role"><i class="fas fa-user-tag me-2"></i>I am a...</label>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <div class="form-floating">
                    <input type="text" class="form-control" id="fullname" name="fullname" placeholder="Full Name" required>
                    <label for="fullname">Full Name</label>
                </div>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                <div class="form-floating">
                    <input type="text" class="form-control" id="userid" name="userid" placeholder="Student/Staff ID" required>
                    <label for="userid">Student/Staff ID</label>
                </div>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-at"></i></span>
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username" placeholder="Choose Username" required>
                    <label for="username">Choose Username</label>
                </div>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" name="email" placeholder="Email Address" required>
                    <label for="email">Email Address</label>
                </div>
            </div>

            <div class="input-group mb-3">
                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                <div class="form-floating">
                    <input type="tel" class="form-control" id="phone" name="phone" placeholder="Phone Number" required>
                    <label for="phone">Phone Number</label>
                </div>
            </div>

            <div class="input-group mb-4">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Create Password" required>
                    <label for="password">Create Password</label>
                </div>
            </div>

            <button type="submit" class="btn btn-signup w-100">
                <i class="fas fa-user-plus me-2"></i>Sign Up
            </button>
        </form>
        
        <div class="toggle-link">
            <i class="fas fa-sign-in-alt me-1"></i>Already have an account? <a href="/login">Login here</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init({
          easing: 'ease',
          duration: 800,
          once: true
      });
    </script>
</body>
</html>
