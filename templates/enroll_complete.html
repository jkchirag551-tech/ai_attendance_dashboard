<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Enrollment Complete | MR. Attendance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2c3e50;
        }
        .confirm-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 45px rgba(0,0,0,0.12);
            text-align: center;
        }
        .confirm-card h1 {
            font-size: 2.8rem;
            margin-bottom: 20px;
            font-weight: 700;
        }
        .confirm-card p {
            font-size: 1.1rem;
            color: #4a4a4a;
        }
        .btn-confirm {
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            border: none;
            color: white;
            padding: 15px 35px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 30px;
            transition: all 0.3s ease;
        }
        .btn-confirm:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(39, 174, 96, 0.25);
        }
    </style>
</head>
<body>
    <div style="position: fixed; top: 40px; left: 40px; width: 60px; height: 60px; background: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.15);">
        <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="width: 100%; height: 100%; object-fit: contain; filter: contrast(1.1);">
    </div>
    <div class="confirm-card">
        <div class="mb-4">
            <i class="fas fa-user-check fa-4x text-success"></i>
        </div>
        <h1>Face Enrollment Complete</h1>
        <p class="mb-3">Thank you, {{ fullname }}. Your face has been successfully registered.</p>
        <p>Your attendance verification is now ready. When you capture again, the system will compare your live image with the enrolled record.</p>
        <a href="/student" class="btn btn-confirm">
            <i class="fas fa-arrow-left me-2"></i>Return to Dashboard
        </a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
