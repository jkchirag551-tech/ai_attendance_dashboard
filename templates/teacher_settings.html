<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings | MR. Attendance</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFDFD;
            --surface-color: #FFFFFF;
            --on-surface: #000000;
            --card-border: rgba(0, 0, 0, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.04);
            --text-muted: rgba(0, 0, 0, 0.4);
            --logo-bg: #000000;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #0F172A;
            --on-surface: #FFFFFF;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --text-muted: rgba(255, 255, 255, 0.4);
            --logo-bg: #000000;
        }

        [data-theme="dark"] .glass-panel {
            background: var(--surface-color);
            border: 1px solid var(--card-border);
        }

        body {
            background-color: var(--bg-color);
            color: var(--on-surface);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: all 0.3s ease;
            min-height: 100vh;
            padding-top: 100px;
            overflow-x: hidden;
        }

        .bg-glow {
            position: fixed; width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, var(--on-surface), transparent);
            opacity: 0.015; z-index: -1; pointer-events: none;
        }
        .glow-1 { top: -100px; right: -50px; }
        .glow-2 { bottom: -80px; left: -60px; width: 700px; height: 700px; opacity: 0.01; }

        .top-bar {
            background: var(--surface-color) !important;
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--card-border);
            padding: 12px 40px;
        }

        .navbar-brand {
            display: flex; align-items: center; gap: 15px;
            font-weight: 900; color: var(--on-surface) !important;
            letter-spacing: -1px; font-size: 1.4rem;
        }

        .brand-logo-container {
            width: 48px; height: 48px;
            background: #000000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .nav-link {
            color: var(--on-surface) !important; opacity: 0.5;
            font-weight: 700; padding: 10px 20px !important;
            border-radius: 14px; transition: all 0.3s ease;
        }
        .nav-link:hover, .nav-link.active {
            opacity: 1; background: var(--on-surface); color: var(--bg-color) !important;
        }

        .glass-panel {
            background: var(--surface-color);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            box-shadow: 0 10px 40px var(--card-shadow);
            padding: 40px;
            margin-bottom: 24px;
        }

        .section-label {
            font-size: 11px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text-muted); margin-bottom: 25px;
            display: block;
        }

        .input-pro {
            background: rgba(0,0,0,0.03); border: 1px solid var(--card-border);
            border-radius: 16px; padding: 15px 20px; color: var(--on-surface);
            font-weight: 600; width: 100%; transition: all 0.2s ease;
        }
        [data-theme="dark"] .input-pro { background: rgba(255,255,255,0.05); }
        .input-pro:focus { outline: none; border-color: var(--on-surface); }

        .btn-custom {
            background: var(--on-surface); color: var(--bg-color);
            border-radius: 18px; padding: 16px 32px;
            font-weight: 800; border: none; transition: all 0.3s ease;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-custom:hover { transform: scale(1.02); opacity: 0.9; }

        .theme-toggle {
            cursor: pointer; width: 48px; height: 48px;
            border-radius: 14px; background: var(--on-surface);
            color: var(--bg-color); display: flex;
            align-items: center; justify-content: center;
            margin-left: 15px;
        }

        .modal-content {
            background: var(--surface-color) !important;
            border: 1px solid var(--card-border) !important;
            border-radius: 28px;
        }

        .form-label {
            color: var(--on-surface);
        }
    </style>
</head>
<body data-theme="light">
    <div class="bg-glow glow-1"></div>
    <div class="bg-glow glow-2"></div>

    <nav class="navbar navbar-expand-lg top-bar fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('teacher.teacher_dashboard') }}">
                <div class="brand-logo-container">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="width:100%; height:100%; object-fit:contain; filter: contrast(1.1);">
                </div>
                <span>MR. Attendance</span>
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('auth.welcome') }}">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('teacher.teacher_dashboard') }}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('teacher.teacher_logs') }}">Logs</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{{ url_for('teacher.settings') }}">Settings</a></li>
                    <li class="nav-item"><div class="theme-toggle" onclick="toggleTheme()"><i class="fas fa-moon" id="theme-icon"></i></div></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container px-lg-5">
        <div class="row mb-5">
            <div class="col-12">
                <h1 class="display-4" style="font-weight: 900; letter-spacing: -2px;">Settings</h1>
                <span class="section-label">Manage Your Preferences</span>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="glass-panel">
                    <span class="section-label">Send Class Notices & Announcements</span>
                    <p style="color: var(--text-muted); margin-bottom: 20px;">Send important updates and notices to your students.</p>
                    <button type="button" class="btn btn-custom w-100" data-bs-toggle="modal" data-bs-target="#noticeModal">
                        <i class="fas fa-bell me-2"></i>Send Notice
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Notice Modal -->
    <div class="modal fade" id="noticeModal" tabindex="-1" aria-labelledby="noticeModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title" id="noticeModalLabel" style="font-weight: 900; font-size: 1.5rem;">Send Notice</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="noticeForm">
                        <div class="mb-4">
                            <label class="form-label fw-bold small opacity-50">Notice Content</label>
                            <textarea class="input-pro" id="noticeContent" name="content" rows="5" placeholder="Write your notice here..." required></textarea>
                        </div>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold small opacity-50">Category</label>
                                <select class="input-pro" id="noticeCategory" name="category" required>
                                    <option value="Info">Info</option>
                                    <option value="Assignment">Assignment</option>
                                    <option value="Important">Important</option>
                                    <option value="Announcement">Announcement</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold small opacity-50">Broadcast</label>
                                <select class="input-pro" id="noticeAudience" name="audience" required>
                                    <option value="all">All Students</option>
                                    <option value="enrolled">Enrolled Students</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-secondary rounded-3" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-custom" onclick="submitNotice()">Send Notice</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function toggleTheme() {
            const body = document.body;
            const next = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            document.getElementById('theme-icon').className = next === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        }
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
        document.getElementById('theme-icon').className = savedTheme === 'light' ? 'fas fa-moon' : 'fas fa-sun';

        function submitNotice() {
            const content = document.getElementById('noticeContent').value.trim();
            const category = document.getElementById('noticeCategory').value;
            const audience = document.getElementById('noticeAudience').value;

            if (!content) {
                alert('Please enter notice content');
                return;
            }

            fetch("{{ url_for('teacher.create_notice') }}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    content: content,
                    category: category,
                    audience: audience
                })
            }).then(r => r.json()).then(data => {
                if (data.status === 'success') {
                    alert('Notice sent successfully!');
                    document.getElementById('noticeForm').reset();
                    bootstrap.Modal.getInstance(document.getElementById('noticeModal')).hide();
                } else {
                    alert('Error: ' + data.message);
                }
            }).catch(err => {
                alert('Error sending notice: ' + err.message);
            });
        }
    </script>
</body>
</html>
