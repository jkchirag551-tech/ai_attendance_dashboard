<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Logs | MR. Attendance</title>
    <link rel="shortcut icon" href="{{ url_for('static', filename='images/logo.png') }}" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FDFDFD;
            --surface-color: #FFFFFF;
            --on-surface: #000000;
            --card-border: rgba(0, 0, 0, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.04);
            --text-muted: rgba(0, 0, 0, 0.4);
            --logo-bg: #000000;
        }

        [data-theme="dark"] {
            --bg-color: #000000;
            --surface-color: #0F172A;
            --on-surface: #FFFFFF;
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: rgba(0, 0, 0, 0.4);
            --text-muted: rgba(255, 255, 255, 0.4);
            --logo-bg: #000000;
        }

        /* Fix for table contrast in Dark Mode */
        [data-theme="dark"] .table {
            --bs-table-color: var(--on-surface);
            --bs-table-bg: transparent;
            --bs-table-border-color: var(--card-border);
            --bs-table-hover-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-color);
            color: var(--on-surface);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: all 0.3s ease;
            min-height: 100vh;
            padding-top: 100px;
        }

        .top-bar {
            background: var(--surface-color) !important;
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--card-border);
            padding: 12px 40px;
        }

        .navbar-brand {
            display: flex; align-items: center; gap: 15px;
            font-weight: 900; color: var(--on-surface) !important;
            letter-spacing: -1px; font-size: 1.4rem;
        }

        .brand-logo-container {
            width: 48px; height: 48px;
            background: #000000; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }

        /* Mobile Optimization */
        @media (max-width: 991px) {
            .top-bar { padding: 12px 20px; }
            .display-4 { font-size: 2.5rem; }
            .glass-panel { padding: 20px; }
            body { padding-top: 80px; }
            .navbar-collapse {
                background: var(--surface-color);
                padding: 20px;
                border-radius: 20px;
                margin-top: 15px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            }
            .nav-link { margin: 5px 0; padding: 10px 20px !important; border-radius: 12px; font-weight: 700; color: var(--on-surface) !important; opacity: 0.5; }
            .nav-link.active { opacity: 1; background: var(--on-surface); color: var(--bg-color) !important; }
        }

        .glass-panel {
            background: var(--surface-color);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            box-shadow: 0 10px 40px var(--card-shadow);
            padding: 0;
            overflow: hidden;
        }

        .table thead th {
            color: var(--text-muted);
            font-size: 11px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1.2px;
            padding: 18px 25px;
        }

        .table tbody td {
            padding: 22px 25px; vertical-align: middle;
            font-weight: 700; color: var(--on-surface);
        }

        .back-btn {
            color: var(--on-surface);
            text-decoration: none;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body data-theme="light">
    <nav class="navbar navbar-expand-lg top-bar fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <div class="brand-logo-container">
                    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Logo" style="width:100%; height:100%; object-fit:contain; filter: contrast(1.1);">
                </div>
                <span>MR. Attendance</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="fas fa-bars"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin.admin_dashboard') }}">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="{{ url_for('admin.logs') }}">Logs</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container px-lg-5">
        <a href="{{ url_for('admin.logs') }}" class="back-btn"><i class="fas fa-arrow-left"></i> BACK TO MONTHLY OVERVIEW</a>

        <div class="row mb-5">
            <div class="col-12">
                <h1 class="display-4" style="font-weight: 900; letter-spacing: -2px;">Daily Archive</h1>
                <span style="font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.4;">Records for {{ month }}</span>
            </div>
        </div>

        <div class="glass-panel">
            <div class="table-responsive">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th class="text-center">Active Identifications</th>
                            <th class="text-end">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for item in daily_data %}
                        <tr>
                            <td><div class="fw-bold">{{ item.date }}</div></td>
                            <td class="text-center">{{ item.count }} Records</td>
                            <td class="text-end">
                                <a href="{{ url_for('admin.day_students', date_str=item.date) }}" class="btn btn-sm btn-dark rounded-pill px-4 fw-bold">View Identity List</a>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.body.setAttribute('data-theme', savedTheme);
    </script>
</body>
</html>
