name: trying_flutter
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  camera: ^0.12.0+1
  video_player: ^2.9.2
  fl_chart: ^0.70.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  local_auth: ^2.3.0
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  shimmer: ^3.0.0
  flutter_heatmap_calendar: ^1.0.5
  socket_io_client: ^2.0.3+1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  excel: ^4.0.5
  file_picker: ^8.1.7
  provider: ^6.1.2
  table_calendar: ^3.2.0
  google_mlkit_face_detection: ^0.12.0
  pdf: ^3.11.1
  printing: ^5.13.2
  firebase_core: ^3.10.0
  firebase_messaging: ^15.2.0
  url_launcher: ^6.3.1
  flutter_local_notifications: ^18.0.1



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_foreground_inset: 20
  web:
    generate: true
    image_path: "assets/images/logo.png"
    background_color: "#000000"
    theme_color: "#000000"
  windows:
    generate: true
    image_path: "assets/images/logo.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/logo.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/videos/
