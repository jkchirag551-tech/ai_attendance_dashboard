name: Apple Platform Builds

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: macos-latest

    defaults:
      run:
        working-directory: trying_flutter

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐦 Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 📦 Install Dependencies
        run: flutter pub get

      - name: 🍏 Build macOS (.app)
        run: flutter build macos --release

      - name: 📱 Build iOS (Unsigned)
        run: flutter build ios --release --no-codesign

      - name: 📤 Upload macOS File
        uses: actions/upload-artifact@v4
        with:
          name: macOS-Build
          path: trying_flutter/build/macos/Build/Products/Release/

      - name: 📤 Upload iOS File
        uses: actions/upload-artifact@v4
        with:
          name: iOS-Build
          path: trying_flutter/build/ios/iphoneos/
